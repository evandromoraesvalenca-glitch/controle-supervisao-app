<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checklist Pré-Abertura Linha 6</title>
    <style>
      :root {
        --orange: #f58220;
        --blue: #0b2344;
        --light: #f3f6fa;
        --line: #d9e1ec;
        --text: #172033;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--light); color: var(--text); }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      .login { min-height: 100vh; display: grid; place-items: center; padding: 24px; background: var(--blue); }
      .login form, .panel, .card, .metric { background: #fff; border-radius: 8px; box-shadow: 0 12px 30px rgba(8, 25, 50, .1); }
      .login form { width: min(430px, 100%); padding: 28px; }
      .top { display: flex; gap: 12px; align-items: center; margin-bottom: 22px; }
      .logo { width: 148px; min-width: 148px; height: 58px; display: flex; align-items: center; justify-content: center; padding: 6px 8px; border-radius: 8px; background: #fff; box-shadow: 0 8px 18px rgba(11,35,68,.12); border: 1px solid var(--line); }
      .logo img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
      h1, h2, h3, p { margin-top: 0; }
      h1, h2, h3 { color: var(--blue); }
      .eyebrow { color: var(--orange); text-transform: uppercase; font-size: 12px; font-weight: 800; letter-spacing: .04em; margin-bottom: 4px; }
      label span { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 700; color: #44546a; }
      input, select, textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; min-height: 48px; padding: 10px 12px; background: #fff; }
      textarea { min-height: 86px; resize: vertical; }
      .stack { display: grid; gap: 14px; }
      .btn { min-height: 52px; border: 0; border-radius: 8px; padding: 0 16px; font-weight: 800; background: var(--orange); color: #fff; }
      .btn.secondary { background: #e7edf5; color: var(--blue); }
      .btn.blue { background: var(--blue); color: #fff; }
      .btn.ghost { background: #fff; color: var(--blue); border: 1px solid var(--line); }
      .btn:disabled { opacity: .45; cursor: not-allowed; }
      header { position: sticky; top: 0; z-index: 5; background: rgba(255,255,255,.96); border-bottom: 1px solid var(--line); }
      .bar, main { max-width: 1180px; margin: 0 auto; padding: 14px 16px; }
      .bar { display: flex; align-items: center; gap: 12px; }
      .title { flex: 1; min-width: 0; }
      .title h1 { margin: 0; font-size: clamp(18px, 4vw, 26px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      main { padding-top: 22px; }
      .grid { display: grid; gap: 12px; }
      .stations { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .station { min-height: 104px; display: flex; align-items: center; justify-content: space-between; padding: 20px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--blue); font-size: 20px; font-weight: 900; text-align: left; }
      .panel, .card, .metric { padding: 16px; }
      .formgrid { grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); }
      .info { background: #f1f5f9; padding: 12px; border-radius: 8px; }
      .info small { display: block; color: #64748b; font-weight: 800; text-transform: uppercase; font-size: 11px; }
      .info strong { display: block; margin-top: 4px; color: var(--blue); }
      .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
      .tabs button { flex: 0 0 auto; min-height: 42px; border: 0; border-radius: 8px; padding: 0 14px; color: var(--blue); background: #fff; font-weight: 800; }
      .tabs button.active { background: var(--blue); color: #fff; }
      .progress { height: 12px; background: #dfe7f1; border-radius: 999px; overflow: hidden; }
      .progress div { height: 100%; background: var(--orange); }
      .item { border: 1px solid var(--line); }
      .item.nok { border-color: #fca5a5; background: #fff7f7; }
      .item.na { background: #f8fafc; }
      .code { display: inline-block; background: var(--blue); color: #fff; font-weight: 900; padding: 5px 8px; border-radius: 5px; font-size: 13px; }
      .tag { display: inline-block; background: #fef3c7; color: #92400e; font-weight: 800; padding: 5px 8px; border-radius: 5px; font-size: 12px; margin-left: 6px; }
      .status { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
      .status button { min-height: 48px; border: 0; border-radius: 8px; background: #edf2f7; color: #334155; font-weight: 900; }
      .status button.active { background: var(--orange); color: #fff; }
      .twocol { display: grid; grid-template-columns: 1fr minmax(220px, 280px); gap: 12px; margin-top: 12px; }
      .photo { display: grid; place-items: center; min-height: 86px; border: 1px dashed #cbd5e1; border-radius: 8px; background: #f8fafc; color: #526173; font-weight: 800; text-align: center; }
      .sticky { position: sticky; bottom: 0; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; background: var(--light); padding: 12px 0; }
      .metrics { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
      .metric b { display: block; font-size: 32px; color: var(--blue); }
      .metric.danger b { color: #dc2626; }
      .filters { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
      .row { border: 1px solid var(--line); border-radius: 8px; padding: 14px; background: #fff; }
      .hidden { display: none !important; }
      @media (max-width: 720px) {
        .user { display: none; }
        .twocol { grid-template-columns: 1fr; }
      }
      @media print {
        header, nav, .no-print { display: none !important; }
        body { background: #fff; }
        main { max-width: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const stations = ["João Paulo I", "Freguesia do Ó", "Santa Marina", "Água Branca", "SESC Pompeia", "Perdizes"];
      const categories = [
        "Elevadores", "Escadas Rolantes", "Bloqueios / Painéis", "Portas de Plataforma 1", "Portas de Plataforma 2", "Iluminação",
        "Dispositivos de Detecção e Combate a Incêndio", "Saúde e Segurança", "Ambiente Geral da Estação",
        "Máquinas de Autoatendimento de Vendas de QR Code", "Operação Parcial Assistida", "Operação Parcial", "Direcionadores de Fluxo"
      ];
      const items = [];
      const add = (codigo, categoria, descricao, controle, opa = true) => items.push({ id: `${categoria}-${codigo}`.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]+/g, "-").toLowerCase(), codigo, categoria, descricao, controle, opa });
      for (let i = 1; i <= 6; i++) add(`EL${String(i).padStart(2, "0")}`, "Elevadores", "Verificar funcionamento, interfones e displays internos e externos, botões e limpeza", "Funcionamento, comunicação, displays, botões e limpeza", i < 4);
      for (let i = 1; i <= 21; i++) add(`ER${String(i).padStart(2, "0")}`, "Escadas Rolantes", "Verificar funcionamento, corrimãos, pentes, degraus, limpeza e ruídos", "Funcionamento, corrimãos, pentes, degraus, limpeza e ruídos");
      for (let i = 1; i <= 15; i++) add(`BL${String(i).padStart(2, "0")}`, "Bloqueios / Painéis", "Verificar funcionamento, limpeza e qualquer dano", "Funcionamento, limpeza e danos");
      add("BL16 PCD", "Bloqueios / Painéis", "Verificar funcionamento, limpeza e qualquer dano", "Acessibilidade, funcionamento, limpeza e danos");
      [["Portas de Plataforma 1", "travamento"], ["Portas de Plataforma 2", "funcionamento"]].forEach(([cat, first]) => {
        add("PFP", cat, `Verificar ${first}, limpeza e dano`, `${first}, limpeza e danos`);
        add("PSE", cat, `Verificar ${first}, limpeza e dano`, `${first}, limpeza e danos`);
        add("PDM 02-23", cat, "Verificar abertura, limpeza e dano", "Abertura, limpeza e danos");
        add("PDM 01-24", cat, cat.endsWith("1") ? "Verificar abertura, limpeza e dano" : "Verificar fechamento, limpeza e dano", "Abertura/fechamento, limpeza e danos");
        add("PSV", cat, cat.endsWith("1") ? "Verificar fechamento e limpeza" : "Verificar travamento, limpeza e dano", "Fechamento/travamento, limpeza e danos");
        add("PCM", cat, cat.endsWith("1") ? "Verificar funcionamento" : "Verificar fechamento e limpeza", "Funcionamento, fechamento e limpeza", false);
        add("Radar", cat, "Verificar funcionamento", "Funcionamento", false);
      });
      [["IL01","Iluminação","Salas Operacionais"],["IL02","Iluminação","Circulação Interna"],["IL03","Iluminação","Circulação Externa"],["INC01","Dispositivos de Detecção e Combate a Incêndio","Hidrantes"],["INC02","Dispositivos de Detecção e Combate a Incêndio","Extintores"],["INC03","Dispositivos de Detecção e Combate a Incêndio","Dispositivo de Acionamento Manual"],["SS01","Saúde e Segurança","Rota de evacuação"],["SS02","Saúde e Segurança","Sinalização de saída de emergência"],["SS03","Saúde e Segurança","Portas de saída de emergência"]].forEach(([c,cat,d]) => add(c,cat,d,"Verificar funcionamento, conservação e segurança"));
      ["Forro de teto","Portas e portões da área pública","Revestimentos de paredes","Lixeiras, porta-maca e bancos","Escadas fixas, corrimãos e guarda-corpos","Cerâmicas de piso interno","Pisos da área pública, piso tátil, rampas e grelhas","Comunicação visual","Sistema de sonorização PAS e multimídia PIS","Pontos comerciais","Sanitários públicos","CFTV","Bodycams","Rádios TETRA","Temperatura da área / A/C"].forEach((d, i) => add(`AMB${String(i + 1).padStart(2, "0")}`, "Ambiente Geral da Estação", d, "Verificar conservação, funcionamento, segurança e limpeza", !["Bodycams","Temperatura da área / A/C"].includes(d)));
      add("QR01", "Máquinas de Autoatendimento de Vendas de QR Code", "Máquinas de autoatendimento de vendas de QR Code", "Verificar funcionamento", false);
      ["Tapumes","Sinalização provisória","Sinal luminoso para embarque","Responsável EPC","Ventilação principal"].forEach((d, i) => add(`OPA${String(i + 1).padStart(2, "0")}`, "Operação Parcial Assistida", d, "Verificar condição operacional e prontidão"));
      [["OP01","Monitor de controle de fluxo"],["OP02","Megafones"],["OP03","Bastão luminoso"],["OP04","Botoeiras de sinaleiro"]].forEach(([codigo, descricao]) => add(codigo, "Operação Parcial", descricao, "Verificar disponibilidade, integridade e funcionamento"));
      add("DF01", "Direcionadores de Fluxo", "Direcionadores de fluxos", "Verificar posicionamento correto, integridade, segregação adequada dos fluxos, visibilidade para os passageiros e ausência de obstáculos");
      const mk = (codigo, categoria, descricao, controle, opa = true) => ({ id: `${categoria}-${codigo}`.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]+/g, "-").toLowerCase(), codigo, categoria, descricao, controle, opa });
      const seq = (prefixo, total) => Array.from({ length: total }, (_, i) => `${prefixo}${String(i + 1).padStart(2, "0")}`);
      const stationProfiles = {
        "Água Branca": { el: 4, elNo: ["EL03", "EL04"], er: 34, erNo: ["ER01", "ER07", "ER09", "ER11", "ER12", "ER14", "ER21", "ER22", "ER23", "ER24", "ER25", "ER26", "ER27", "ER28", "ER29", "ER30", "ER31", "ER32", "ER33", "ER34"], bl: [...seq("BL", 6), "BL07 PCD", "BL08 PCD"], dce: true },
        "Freguesia do Ó": { el: 10, elNo: ["EL05", "EL06", "EL07", "EL08", "EL09", "EL10"], er: 21, erNo: ["ER05", "ER08", "ER11", "ER14", "ER17", "ER20", "ER21"], bl: [...seq("BL", 10), "BL11 PCD", "BL12 PCD"] },
        "João Paulo I": { el: 5, elNo: ["EL04", "EL05"], er: 19, erNo: [], bl: [...seq("BL", 10), "BL11 PCD", "BL12 PCD"] },
        "Perdizes": { el: 5, elNo: ["EL04", "EL05"], er: 12, erNo: [], bl: [...seq("BL", 8), "BL09 PCD", "BL10 PCD"] },
        "Santa Marina": { el: 6, elNo: ["EL03", "EL04", "EL05", "EL06"], er: 15, erNo: ["ER05", "ER10", "ER11", "ER12", "ER13", "ER14", "ER15"], bl: [...seq("BL", 12), "BL13 PCD", "BL14 PCD"] },
        "SESC Pompeia": { el: 6, elNo: ["EL04", "EL05", "EL06"], er: 21, erNo: ["ER02", "ER04", "ER14", "ER15", "ER16", "ER17", "ER18", "ER19", "ER20", "ER21"], bl: [...seq("BL", 15), "BL16 PCD"] }
      };
      const itemsForInspection = (ins) => {
        const profile = stationProfiles[ins?.station || ""];
        if (!profile) return items;
        const elevadores = seq("EL", profile.el).map(c => mk(c, "Elevadores", "Verificar funcionamento, interfones e displays internos e externos, botões e limpeza", "Funcionamento, comunicação, displays, botões e limpeza", !profile.elNo.includes(c)));
        const escadas = seq("ER", profile.er).map(c => mk(c, "Escadas Rolantes", "Verificar funcionamento, corrimãos, pentes, degraus, limpeza e ruídos", "Funcionamento, corrimãos, pentes, degraus, limpeza e ruídos", !profile.erNo.includes(c)));
        const bloqueios = profile.bl.map(c => mk(c, "Bloqueios / Painéis", "Verificar funcionamento, limpeza e qualquer dano", c.includes("PCD") ? "Acessibilidade, funcionamento, limpeza e danos" : "Funcionamento, limpeza e danos"));
        const fixos = items.filter(i => !["Elevadores", "Escadas Rolantes", "Bloqueios / Painéis"].includes(i.categoria));
        const dce = profile.dce ? [mk("DCE01", "Dispositivo de Contagem Eletrônica (DCE)", "Câmeras", "Inspecionar condições gerais, limpeza, desgastes, anomalias, nitidez, foco e clareza das imagens", false)] : [];
        return [...elevadores, ...escadas, ...bloqueios, ...fixos, ...dce];
      };

      const store = {
        get user() { return JSON.parse(localStorage.getItem("preview_user") || "null"); },
        set user(v) { localStorage.setItem("preview_user", JSON.stringify(v)); },
        get inspections() { return JSON.parse(localStorage.getItem("preview_inspections") || "[]"); },
        set inspections(v) { localStorage.setItem("preview_inspections", JSON.stringify(v)); },
        get absences() { return JSON.parse(localStorage.getItem("preview_absences") || "[]"); },
        set absences(v) { localStorage.setItem("preview_absences", JSON.stringify(v)); },
        get staffing() { return JSON.parse(localStorage.getItem("preview_staffing") || "[]"); },
        set staffing(v) { localStorage.setItem("preview_staffing", JSON.stringify(v)); }
      };
      let state = { tab: "inicio", step: "estacoes", user: store.user, inspection: null, category: categories[0], filters: {} };
      const app = document.getElementById("app");
      const today = () => new Date().toISOString().slice(0, 10);
      const time = () => new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
      const staffingDateTime = (r) => new Date(`${r.data}T${String(r.hora || "00:00").slice(0,5)}:00`);
      const periodDate = (data, hora, fallback) => new Date(`${data || today()}T${hora || fallback}:00`);      const applicable = (item, ins) => ins.turno !== "Operação Parcial" || item.opa;
      const summary = (ins) => {
        const stationItems = itemsForInspection(ins);
        const aplic = stationItems.filter(i => applicable(i, ins));
        const ok = aplic.filter(i => ins.respostas[i.id]?.status === "OK").length;
        const nok = aplic.filter(i => ins.respostas[i.id]?.status === "NOK").length;
        const na = stationItems.length - aplic.length + aplic.filter(i => ins.respostas[i.id]?.status === "NA").length;
        const pending = aplic.filter(i => !ins.respostas[i.id]?.status).length;
        const invalid = aplic.filter(i => ins.respostas[i.id]?.status === "NOK" && !ins.respostas[i.id].obs).length;
        return { total: stationItems.length, ok, nok, na, pending, invalid, done: pending === 0 && invalid === 0 };
      };
      const saveInspection = (ins) => { const all = store.inspections; const ix = all.findIndex(i => i.id === ins.id); ix >= 0 ? all.splice(ix, 1, ins) : all.unshift(ins); store.inspections = all; };
      const set = (patch) => { state = { ...state, ...patch }; render(); };

      function homeMenu() {
        return `<p class="eyebrow">Início</p><h2>Olá, ${state.user.nome}</h2><div class="grid"><button class="station" data-menu="estacoes"><span><b style="font-size:26px">Checklist</b><br><small>Escolher estação e iniciar checklist de pré-abertura.</small></span><b>›</b></button><button class="station" data-menu="ausencia"><span><b style="font-size:26px">Registrar ausência</b><br><small>Informar falta, banco de horas, atestado ou home office.</small></span><b>›</b></button><button class="station" data-menu="efetivo"><span><b style="font-size:26px">Distribuição</b><br><small>Lançar o efetivo diário por estação.</small></span><b>›</b></button><button class="station" data-menu="dashboardEfetivo"><span><b style="font-size:26px">Dashboard Efetivo</b><br><small>Seguir para a visualização geral do efetivo lançado.</small></span><b>›</b></button><button class="station" data-menu="registros"><span><b style="font-size:26px">Registros salvos</b><br><small>Visualizar checklists, ausências e efetivo salvos.</small></span><b>›</b></button></div>`;
      }
      function absenceScreen() {
        return `<section class="panel"><p class="eyebrow">Registro</p><h2>Registrar ausência</h2><form class="stack" id="absence-form"><label><span>Nome do colaborador</span><input name="colaborador" required></label><label><span>Tipo de registro</span><select name="tipo"><option value="falta">Falta</option><option value="banco-de-horas">Banco de horas</option><option value="atestado">Atestado</option><option value="home-office">Home office</option></select></label><button class="btn">Salvar registro</button></form></section>`;
      }

      function staffingScreen() {
        const rows = store.staffing.filter(r => r.data === today());
        const total = rows.reduce((sum, item) => sum + Number(item.total || 0), 0);
        const lideres = rows.reduce((sum, item) => sum + Number(item.lideres || 0), 0);
        const aas = rows.reduce((sum, item) => sum + Number(item.aas || 0), 0);
        const aa = rows.reduce((sum, item) => sum + Number(item.aa || 0), 0);
        const filled = new Set(rows.map(item => item.estacao)).size;
        const missing = stations.filter(station => !rows.some(item => item.estacao === station));
        const supervisorOptions = ["Evandro", "Lucas", "Ana", "Audrey", "Dackson", "Junior", "Marta", "A definir"].map(name => `<option>${name}</option>`).join("");
        return `<p class="eyebrow">Distribuição</p><h2>Lançamento de efetivo</h2>
          <section class="panel">
            <form class="stack" id="staffing-form">
              <div class="grid formgrid">
                <label><span>Data</span><input name="data" type="date" value="${today()}" required></label>
                <label><span>Horário</span><input name="hora" type="time" value="${time()}" required></label>
                <label><span>Estação</span><select name="estacao" required>${stations.map(station => `<option>${station}</option>`).join("")}</select></label>
                <label><span>Supervisor</span><select name="supervisor" required>${supervisorOptions}</select></label>
                <label><span>Líderes</span><input name="lideres" type="number" min="0" step="1" value="0" required></label>
                <label><span>AAS</span><input name="aas" type="number" min="0" step="1" value="0" required></label>
                <label><span>AA</span><input name="aa" type="number" min="0" step="1" value="0" required></label>
                <div class="info"><small>Efetivo total</small><strong id="staffing-total">0</strong></div>
              </div>
              <label><span>Observações</span><textarea name="observacao" placeholder="Opcional"></textarea></label>
              <button class="btn" type="submit">Salvar lançamento</button>
            </form>
          </section>
          <div class="grid metrics">
            ${[["Efetivo hoje", total], ["Líderes", lideres], ["AAS", aas], ["AA", aa], ["Estações preenchidas", filled], ["Sem preenchimento", missing.length]].map(([label, value]) => `<div class="metric ${label === "Sem preenchimento" ? "danger" : ""}"><span>${label}</span><b>${value}</b></div>`).join("")}
          </div>`;
      }

      function staffingDashboardScreen() {
        const startDate = state.staffingStartDate || today();
        const startTime = state.staffingStartTime || "00:00";
        const endDate = state.staffingEndDate || today();
        const endTime = state.staffingEndTime || "23:59";
        const stationFilter = state.staffingStation || "Todas";
        const supervisorFilter = state.staffingSupervisor || "Todos";
        const statusFilter = state.staffingStatus || "Todos";
        const activeView = state.dashboardView || "geral";
        const start = periodDate(startDate, startTime, "00:00");
        const end = periodDate(endDate, endTime, "23:59");
        const statusOf = item => item.observacao ? "Atenção" : Number(item.total || 0) <= 0 ? "Em andamento" : "Concluído";
        const pill = status => ({ "Concluído": "background:#ecfdf5;color:#047857", "Em andamento": "background:#eff6ff;color:#1d4ed8", "Pendente": "background:#fff7ed;color:#c2410c", "Atenção": "background:#fff1f2;color:#be123c" }[status] || "background:#f1f5f9;color:#334155");
        const rowsPeriod = store.staffing.filter(item => { const current = staffingDateTime(item); return current >= start && current <= end; }).sort((a, b) => staffingDateTime(b) - staffingDateTime(a));
        const supervisors = Array.from(new Set(rowsPeriod.map(item => item.supervisor).filter(Boolean))).sort();
        const rowsFiltered = rowsPeriod.filter(item => { const st = statusOf(item); return (stationFilter === "Todas" || item.estacao === stationFilter) && (supervisorFilter === "Todos" || item.supervisor === supervisorFilter) && (statusFilter === "Todos" || st === statusFilter); });
        const pendingStations = stations.filter(station => !rowsPeriod.some(item => item.estacao === station)).filter(station => stationFilter === "Todas" || station === stationFilter).filter(() => supervisorFilter === "Todos").filter(() => statusFilter === "Todos" || statusFilter === "Pendente");
        const executiveRows = [
          ...rowsFiltered.map(item => ({ id:item.id, data:item.data, hora:item.hora || "00:00", estacao:item.estacao, supervisor:item.supervisor, categoria:"Efetivo operacional", status:statusOf(item), observacao:item.observacao || "Lançamento registrado sem observação.", total:Number(item.total || 0) })),
          ...pendingStations.map(station => ({ id:`pendente-${station}`, data:endDate, hora:"-", estacao:station, supervisor:"A definir", categoria:"Efetivo pendente", status:"Pendente", observacao:"Aguardando lançamento no período selecionado.", total:0, pending:true }))
        ];
        const totalRecords = executiveRows.length;
        const done = executiveRows.filter(item => item.status === "Concluído").length;
        const progress = executiveRows.filter(item => item.status === "Em andamento").length;
        const pending = executiveRows.filter(item => item.status === "Pendente").length;
        const attention = executiveRows.filter(item => item.status === "Atenção").length;
        const completion = totalRecords ? Math.round((done / totalRecords) * 100) : 0;
        const totalStaff = rowsFiltered.reduce((sum, item) => sum + Number(item.total || 0), 0);
        const byStation = stations.map(station => { const list = rowsFiltered.filter(item => item.estacao === station); const stationStatus = pendingStations.includes(station) ? "Pendente" : list.some(item => statusOf(item) === "Atenção") ? "Atenção" : list.length ? "Concluído" : "Pendente"; return { station, registros:list.length, efetivo:list.reduce((sum, item) => sum + Number(item.total || 0), 0), status:stationStatus }; });
        const maxStation = Math.max(1, ...byStation.map(item => item.registros));
        const topStation = [...byStation].sort((a, b) => b.registros - a.registros)[0];
        const statusRows = ["Concluído", "Em andamento", "Pendente", "Atenção"].map(status => ({ status, total: executiveRows.filter(item => item.status === status).length }));
        const maxStatus = Math.max(1, ...statusRows.map(item => item.total));
        const bySupervisor = Array.from(new Set(rowsFiltered.map(item => item.supervisor).filter(Boolean))).map(supervisor => ({ supervisor, registros:rowsFiltered.filter(item => item.supervisor === supervisor).length, efetivo:rowsFiltered.filter(item => item.supervisor === supervisor).reduce((sum, item) => sum + Number(item.total || 0), 0) })).sort((a,b) => b.registros - a.registros);
        const maxSupervisor = Math.max(1, ...bySupervisor.map(item => item.registros));
        const insights = [["Estação com maior volume", topStation && topStation.registros ? topStation.station : "Sem registros", `${topStation ? topStation.registros : 0} registro(s)`], ["Conclusão geral", `${completion}%`, `${done} de ${totalRecords} registro(s)`], ["Efetivo total lançado", totalStaff, "Soma dos lançamentos filtrados"], ["Última atualização", rowsPeriod[0] ? new Date(rowsPeriod[0].atualizado_em || new Date()).toLocaleString("pt-BR") : "Sem atualização", "Dados do período selecionado"]];
        const points = [pending ? `${pending} estação(ões) sem lançamento no período.` : "", attention ? `${attention} registro(s) com observação para acompanhamento.` : "", progress ? `${progress} registro(s) sem efetivo informado.` : ""].filter(Boolean);
        const viewButtons = [["geral","Geral","Indicadores"],["estacoes","Estações","Por local"],["status","Status","Situação"],["supervisores","Supervisores","Distribuição"],["resumo","Resumo","Insights"],["tabela","Tabela","Registros"]].map(([id,label,desc]) => `<button class="row" data-dashboard-view="${id}" style="min-height:62px;text-align:left;border-color:${activeView === id ? '#f58220' : '#d9e1ec'};background:${activeView === id ? '#fff7ed' : '#f8fafc'}"><b>${label}</b><br><small>${desc}</small></button>`).join("");
        const metricCards = `<div class="grid metrics">${[["Total",totalRecords],["Pendentes",pending],["Andamento",progress],["Concluídos",done],["Atenção",attention],["Conclusão",completion+"%"]].map(([label,value]) => `<div class="metric"><span>${label}</span><b>${value}</b></div>`).join("")}</div>`;
        const generalView = `${metricCards}<section class="panel"><h3>Situação geral</h3><div class="grid formgrid">${insights.map(([label,value,detail]) => `<div class="info"><small>${label}</small><strong>${value}</strong><br><small>${detail}</small></div>`).join("")}</div></section>`;
        const stationView = `<section class="panel"><h3>Visão por estação</h3><p style="color:#64748b;font-weight:600">Toque em uma estação para filtrar.</p><div class="stack">${byStation.map(item => `<button class="row" data-filter-station="${item.station}" style="width:100%;text-align:left;border-color:${stationFilter === item.station ? '#f58220' : '#d9e1ec'}"><div style="display:flex;justify-content:space-between;gap:12px"><div><b>${item.station}</b><br><small>Registros ${item.registros} · Efetivo ${item.efetivo}</small></div><span style="${pill(item.status)};border-radius:999px;padding:5px 9px;font-weight:800;font-size:12px">${item.status}</span></div><div class="progress" style="margin-top:10px"><div style="width:${(item.registros / maxStation) * 100}%"></div></div></button>`).join("")}</div></section>`;

      function normalizePdfText(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^\x20-\x7E]/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }
      function wrapPdfLine(text, max = 92) {
        const words = normalizePdfText(text).split(" ");
        const lines = [];
        let current = "";
        words.forEach((word) => {
          const next = current ? `${current} ${word}` : word;
          if (next.length > max && current) {
            lines.push(current);
            current = word;
          } else {
            current = next;
          }
        });
        if (current) lines.push(current);
        return lines;
      }
      function pdfEscape(text) {
        return normalizePdfText(text).replace(/\\/g, "\\\\").replace(/\(/g, "\\(").replace(/\)/g, "\\)");
      }

        };
        const textAt = (x, top, text, size = 10, bold = false, color = rgb(15, 23, 42)) => {
          const safe = pdfEscape(text);
          cmd(`BT ${color} rg /${bold ? "F2" : "F1"} ${size} Tf ${x} ${pageHeight - top} Td (${safe}) Tj ET`);
        };
        const header = () => {
          rect(0, 0, 595, 64, rgb(248, 250, 252));
          rect(38, 62, 520, 1, rgb(226, 232, 240));
          rect(42, 18, 132, 8, rgb(245, 130, 32));

          textAt(42, 57, "LINHA 6 | SAO PAULO", 9, false, rgb(11, 35, 68));
          textAt(244, 24, "Relatorio Gerencial de Pre-Abertura", 14, true, rgb(11, 35, 68));

        };
        const footer = () => {

        const newPage = () => {

          pages.push([]);
          currentPage += 1;
          y = 84;
          header();
        };
        const ensure = (height) => { if (y + height > 790) newPage(); };
        const metric = (x, label, value, color) => {

          textAt(x + 10, 320, label, 8, false, rgb(100, 116, 139));

        };
        header();
        rect(38, 84, 520, 94, rgb(11, 35, 68));
        textAt(56, 116, "Checklist Digital Operacional", 23, true, rgb(255, 255, 255));
        textAt(56, 142, "Relatorio gerencial de pre-abertura de estacao", 11, false, rgb(226, 232, 240));
        textAt(56, 162, `Gerado em ${new Date().toLocaleString("pt-BR")}`, 9, false, rgb(226, 232, 240));
        rect(382, 108, 146, 44, rgb(255, 255, 255));
        textAt(396, 128, inspection.station, 12, true, rgb(11, 35, 68));
        textAt(396, 145, `${inspection.data} | ${inspection.turno}`, 8, false, rgb(100, 116, 139));
        rect(38, 198, 520, 70, rgb(248, 250, 252), rgb(226, 232, 240));
        textAt(56, 220, "Dados da inspecao", 12, true, rgb(11, 35, 68));
        textAt(56, 240, `Responsavel: ${inspection.nome}`, 9, false, rgb(71, 85, 105));
        textAt(56, 256, `RE: ${inspection.re || "-"}`, 9, false, rgb(71, 85, 105));
        textAt(220, 240, `Inicio: ${inspection.inicio || "-"}`, 9, false, rgb(71, 85, 105));
        textAt(220, 256, `Fim: ${inspection.fim || "-"}`, 9, false, rgb(71, 85, 105));
        textAt(376, 240, `Status: ${inspection.status}`, 9, false, rgb(71, 85, 105));
        textAt(376, 256, `ID: ${String(inspection.id).slice(0, 8)}`, 9, false, rgb(71, 85, 105));
        metric(38, "Total", s.total, rgb(11, 35, 68));
        metric(144, "OK", s.ok, rgb(16, 124, 86));
        metric(250, "NOK", s.nok, rgb(185, 28, 28));
        metric(356, "N/A", s.na, rgb(100, 116, 139));
        metric(462, "Pend.", s.pending + s.invalid, rgb(202, 138, 4));
        textAt(38, 392, "Resumo Gerencial", 14, true, rgb(11, 35, 68));
        const insights = [
          s.done ? "Inspecao sem pendencias impeditivas para finalizacao." : "Existem itens pendentes ou NOK sem observacao.",
          nokItems.length ? `${nokItems.length} item(ns) em NOK exigem acompanhamento operacional.` : "Nenhum item NOK registrado.",
          "Fotos permanecem como evidencia opcional, quando houver necessidade de registro visual."
        ];
        y = 414;
        insights.forEach((line) => { textAt(52, y, `- ${line}`, 9, false, rgb(71, 85, 105)); y += 16; });
        y += 16;
        textAt(38, y, "Itens do checklist", 14, true, rgb(11, 35, 68));
        y += 18;
        stationItems.forEach((item, index) => {
          ensure(58);
          const resposta = inspection.respostas[item.id] || {};
          const status = (!applicable(item, inspection) && !resposta.status) ? "N/A" : (resposta.status === "NA" ? "N/A" : resposta.status || "Pendente");
          const statusFill = status === "OK" ? rgb(16, 124, 86) : status === "NOK" ? rgb(185, 28, 28) : status === "N/A" ? rgb(100, 116, 139) : rgb(202, 138, 4);
          rect(38, y, 520, 48, index % 2 ? rgb(248, 250, 252) : rgb(255, 255, 255), rgb(226, 232, 240));
          textAt(50, y + 16, item.codigo, 10, true, rgb(11, 35, 68));
          rect(492, y + 9, 48, 16, statusFill);
          textAt(516, y + 21, status, 8, true, rgb(255, 255, 255));
          wrapPdfLine(`${item.categoria} | ${item.descricao}`, 70).slice(0, 2).forEach((line, lineIndex) => textAt(104, y + 14 + (lineIndex * 10), line, 8, false, rgb(51, 65, 85)));
          const obs = resposta.obs ? `Obs.: ${resposta.obs}` : "Obs.: sem observacao registrada";
          textAt(104, y + 39, wrapPdfLine(obs, 82)[0] || obs, 8, false, rgb(100, 116, 139));
          const photos = (resposta.photos || []).join(", ");
          if (photos) textAt(392, y + 39, wrapPdfLine(`Fotos: ${photos}`, 28)[0], 7, false, rgb(100, 116, 139));
          y += 54;
        });
        footer();
        const objects = [];
        const pageIds = pages.map((_, index) => 3 + index * 2);
        const fontRegularId = 3 + pages.length * 2;
        const fontBoldId = fontRegularId + 1;
        objects[1] = "<< /Type /Catalog /Pages 2 0 R >>";
        objects[2] = `<< /Type /Pages /Kids [${pageIds.map((pageId) => `${pageId} 0 R`).join(" ")}] /Count ${pages.length} >>`;
        pages.forEach((commands, index) => {
          const pageId = 3 + index * 2;
          const contentId = pageId + 1;
          const stream = commands.join("\n");
          objects[pageId] = `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 ${fontRegularId} 0 R /F2 ${fontBoldId} 0 R >> >> /Contents ${contentId} 0 R >>`;
          objects[contentId] = `<< /Length ${stream.length} >>\nstream\n${stream}\nendstream`;
        });
        objects[fontRegularId] = "<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>";
        objects[fontBoldId] = "<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>";
        let pdf = "%PDF-1.4\n";
        const offsets = [0];
        for (let i = 1; i < objects.length; i++) { offsets[i] = pdf.length; pdf += `${i} 0 obj\n${objects[i]}\nendobj\n`; }
        const xref = pdf.length;
        pdf += `xref\n0 ${objects.length}\n0000000000 65535 f \n`;
        for (let i = 1; i < objects.length; i++) pdf += `${String(offsets[i]).padStart(10, "0")} 00000 n \n`;
        pdf += `trailer\n<< /Size ${objects.length} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
        const blob = new Blob([pdf], { type: "application/pdf" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `relatorio-gerencial-${normalizePdfText(inspection.station).replace(/\s+/g, "-").toLowerCase()}-${inspection.data}.pdf`;
        link.click();
        URL.revokeObjectURL(link.href);
      }
      function render() {
        if (!state.user) { app.innerHTML = login(); return bind(); }
        let content = "";
        if (state.tab === "inicio") content = homeMenu();
        if (state.tab === "estacoes") content = state.step === "inicio" ? startScreen() : state.step === "checklist" ? checklistScreen() : state.step === "resumo" ? resumeScreen() : stationScreen();
        if (state.tab === "ausencia") content = absenceScreen();
        if (state.tab === "efetivo") content = staffingScreen();
        if (state.tab === "dashboardEfetivo") content = staffingDashboardScreen();
        if (state.tab === "registros") content = recordsScreen();
        if (state.tab === "historico") content = historyScreen();
        if (state.tab === "dashboard") content = dashboardScreen();
        if (state.tab === "admin") content = adminScreen();
        app.innerHTML = shell(content);
        bind();
      }
      function bind() {
        document.querySelector("#login")?.addEventListener("submit", e => { e.preventDefault(); const f=new FormData(e.target); state.user={ id: crypto.randomUUID(), nome:f.get("nome"), re:f.get("re"), perfil:f.get("perfil") }; store.user=state.user; render(); });
        document.querySelectorAll("[data-menu]").forEach(b => b.onclick = () => set({ tab: b.dataset.menu, step: "estacoes" }));
        document.querySelectorAll("[data-record-filter]").forEach(button => button.addEventListener("click", () => set({ recordsFilter: button.dataset.recordFilter })));
        document.querySelector("#records-date-filter")?.addEventListener("change", e => set({ recordsDateFilter: e.target.value }));
        document.querySelector("[data-clear-records-date]")?.addEventListener("click", () => set({ recordsDateFilter: "" }));
        document.querySelector("#absence-form")?.addEventListener("submit", e => { e.preventDefault(); const f = new FormData(e.target); store.absences = [{ id: crypto.randomUUID(), colaborador: f.get("colaborador"), tipo: f.get("tipo"), registrado_por: state.user.nome, registrado_em: new Date().toISOString() }, ...store.absences]; alert("Registro salvo no Supabase."); });
        document.querySelector("#staffing-date")?.addEventListener("change", e => set({ staffingDate: e.target.value }));
        document.querySelector("#staffing-start-date")?.addEventListener("change", e => set({ staffingStartDate: e.target.value }));
        document.querySelector("#staffing-start-time")?.addEventListener("change", e => set({ staffingStartTime: e.target.value }));
        document.querySelector("#staffing-end-date")?.addEventListener("change", e => set({ staffingEndDate: e.target.value }));
        document.querySelector("#staffing-end-time")?.addEventListener("change", e => set({ staffingEndTime: e.target.value }));
        document.querySelector("#staffing-station")?.addEventListener("change", e => set({ staffingStation: e.target.value }));
        document.querySelector("#staffing-supervisor")?.addEventListener("change", e => set({ staffingSupervisor: e.target.value }));
        document.querySelector("#staffing-status")?.addEventListener("change", e => set({ staffingStatus: e.target.value }));
        document.querySelector("[data-clear-staffing-filters]")?.addEventListener("click", () => set({ staffingStartDate: today(), staffingStartTime: "00:00", staffingEndDate: today(), staffingEndTime: "23:59", staffingStation: "Todas", staffingSupervisor: "Todos", staffingStatus: "Todos", dashboardView: "geral" }));
        document.querySelectorAll("[data-dashboard-view]").forEach(button => button.addEventListener("click", () => set({ dashboardView: button.dataset.dashboardView })));
        document.querySelectorAll("[data-filter-station]").forEach(button => button.addEventListener("click", () => set({ staffingStation: button.dataset.filterStation })));
        document.querySelector("[data-refresh-staffing]")?.addEventListener("click", () => render());
        document.querySelectorAll("[data-delete-staffing]").forEach(button => button.addEventListener("click", () => {
          if (!confirm("Apagar este lançamento?")) return;
          store.staffing = store.staffing.filter(item => item.id !== button.dataset.deleteStaffing);
          render();
        }));
        document.querySelectorAll("[data-edit-staffing-record]").forEach(button => button.addEventListener("click", () => set({ editStaffingId: button.dataset.editStaffingRecord })));
        document.querySelectorAll("[data-cancel-staffing-edit]").forEach(button => button.addEventListener("click", () => set({ editStaffingId: null })));
        document.querySelectorAll("[data-delete-staffing-record]").forEach(button => button.addEventListener("click", () => {
          if (!confirm("Excluir este lançamento de efetivo?")) return;
          store.staffing = store.staffing.filter(item => item.id !== button.dataset.deleteStaffingRecord);
          set({ editStaffingId: null });
        }));
        document.querySelectorAll("[data-edit-staffing-form]").forEach(form => form.addEventListener("submit", e => {
          e.preventDefault();
          const f = new FormData(form);
          const lideres = Math.max(0, Number(f.get("lideres") || 0));
          const aas = Math.max(0, Number(f.get("aas") || 0));
          const aa = Math.max(0, Number(f.get("aa") || 0));
          store.staffing = store.staffing.map(item => item.id === form.dataset.editStaffingForm ? { ...item, data: f.get("data"), hora: f.get("hora"), estacao: f.get("estacao"), supervisor: f.get("supervisor"), lideres, aas, aa, total: lideres + aas + aa, observacao: f.get("observacao") || "", atualizado_em: new Date().toISOString() } : item);
          alert("Lançamento de efetivo atualizado.");
          set({ editStaffingId: null });
        }));
        const staffingForm = document.querySelector("#staffing-form");
        if (staffingForm) {
          const updateTotal = () => {
            const f = new FormData(staffingForm);
            const total = Math.max(0, Number(f.get("lideres") || 0)) + Math.max(0, Number(f.get("aas") || 0)) + Math.max(0, Number(f.get("aa") || 0));
            document.querySelector("#staffing-total").textContent = String(total);
          };
          staffingForm.querySelectorAll("input[type='number']").forEach(input => input.addEventListener("input", updateTotal));
          staffingForm.addEventListener("submit", e => {
            e.preventDefault();
            const f = new FormData(e.target);
            const supervisor = String(f.get("supervisor") || "");
            const lideres = Math.max(0, Number(f.get("lideres") || 0));
            const aas = Math.max(0, Number(f.get("aas") || 0));
            const aa = Math.max(0, Number(f.get("aa") || 0));
            const registro = { id: crypto.randomUUID(), data: f.get("data"), hora: f.get("hora") || time(), estacao: f.get("estacao"), supervisor, lideres, aas, aa, total: lideres + aas + aa, observacao: f.get("observacao") || "", usuario: state.user.nome, atualizado_em: new Date().toISOString() };
            const all = store.staffing;
            all.unshift(registro);
            store.staffing = all;
            alert("Registro salvo.");
            set({ tab: "efetivo" });
          });
        }        document.querySelector("[data-logout]")?.addEventListener("click", () => { localStorage.removeItem("preview_user"); set({ user: null }); });
        document.querySelector("[data-home]")?.addEventListener("click", () => set({ tab: "inicio", step: "estacoes" }));
        document.querySelectorAll("[data-station]").forEach(b => b.onclick = () => set({ step:"inicio", inspection:{ id:crypto.randomUUID(), station:b.dataset.station, data:today(), inicio:time(), nome:state.user.nome, re:state.user.re, turno:"Manhã", status:"rascunho", respostas:{} } }));
        document.querySelectorAll("[data-resume]").forEach(b => b.onclick = () => set({ inspection: store.inspections.find(i=>i.id===b.dataset.resume), step:"checklist" }));
        document.querySelector("[data-back]")?.addEventListener("click", () => set({ step:"estacoes" }));
        document.querySelector("[data-start]")?.addEventListener("click", () => { state.inspection.re=document.querySelector("#re").value; state.inspection.turno=document.querySelector("#turno").value; state.inspection.status="em_andamento"; saveInspection(state.inspection); set({ step:"checklist" }); });
        document.querySelectorAll("[data-cat]").forEach(b => b.onclick = () => set({ category:b.dataset.cat }));
        document.querySelectorAll("[data-status]").forEach(b => b.onclick = () => { const [id,st]=b.dataset.status.split(":"); const r=state.inspection.respostas[id]||{}; state.inspection.respostas[id]={...r,status:st,at:new Date().toISOString()}; saveInspection(state.inspection); render(); });
        document.querySelectorAll("[data-obs]").forEach(t => t.oninput = () => { const r=state.inspection.respostas[t.dataset.obs]||{}; state.inspection.respostas[t.dataset.obs]={...r,obs:t.value,at:new Date().toISOString()}; saveInspection(state.inspection); });
        document.querySelectorAll("[data-photo]").forEach(inp => inp.onchange = () => { const r=state.inspection.respostas[inp.dataset.photo]||{}; state.inspection.respostas[inp.dataset.photo]={...r,photos:Array.from(inp.files).map(f=>f.name),at:new Date().toISOString()}; saveInspection(state.inspection); render(); });
        document.querySelector("[data-save]")?.addEventListener("click", () => { saveInspection(state.inspection); alert("Inspeção salva."); });
        document.querySelector("[data-summary]")?.addEventListener("click", () => set({ step:"resumo" }));
        document.querySelector("[data-fix]")?.addEventListener("click", () => set({ step:"checklist" }));
        document.querySelector("[data-finish]")?.addEventListener("click", () => { state.inspection.status="finalizada"; state.inspection.fim=time(); saveInspection(state.inspection); if (confirm("Inspeção finalizada. Deseja baixar o PDF agora?")) downloadChecklistPdf(state.inspection.id); set({ tab:"historico", step:"estacoes" }); });
        document.querySelector("[data-export]")?.addEventListener("click", () => { const csv="estacao;data;turno;responsavel;status\\n"+store.inspections.map(i=>`${i.station};${i.data};${i.turno};${i.nome};${i.status}`).join("\\n"); const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv"})); a.download="inspecoes-linha6.csv"; a.click(); });
        document.querySelectorAll("[data-pdf]").forEach(b => b.onclick = () => downloadChecklistPdf(b.dataset.pdf));
      }
      render();
    </script>
  </body>
</html>
